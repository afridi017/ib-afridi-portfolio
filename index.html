            background-color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .container {

            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {

            border: 3px solid #e63946; 
            margin: 20px auto;
            display: block;
            object-fit: cover;
        }
        .motivation {

            margin: 20px 0;
        }
        .social-links {

            border: 2px solid #000;
            text-decoration: none;
            color: black;
            font-weight: bold;

        .btn:hover {

        .whatsapp { background-color: #25D366; color: white; border-color: #25D366; }

        .snapchat { background-color: #FFFC00; color: black; border-color: #FFFC00; }
        .github { background-color: #333; color: white; border-color: #333; }
        
        h3 {
            color: #1d3557; 
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .skills {
            list-style: none; 
            font-size: 18px;
            padding: 0;
        }
        .skills li {
            margin: 8px 0;
        }
        footer {

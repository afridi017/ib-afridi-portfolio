<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Afridi - Digital Creator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.3s;
        }
        /* DARK MODE KI CSS */
        body.dark-mode {
            background-color: #121212;
        }
        body.dark-mode .container {
            background-color: #1e1e1e;
            box-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }
        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode .skills {
            color: #ffffff;
        }
        body.dark-mode .motivation {
            color: #4fd1c5;
        }
        body.dark-mode footer {
            color: #aaa;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background-color: white;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: all 0.3s;
        }
        h1 {
            color: #e63946;
            font-size: 36px;
            text-shadow: 2px 2px 4px #aaa;
            margin-bottom: 10px;
        }
        h2 {
            color: #1d3557;
            font-size: 20px;
            margin-bottom: 25px;
        }
        .profile-img {
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 3px solid #e63946; 
            margin: 20px auto;
            display: block;
            object-fit: cover;
        }
        .motivation {
            font-size: 22px;
            font-weight: bold;
            color: #2a9d8f;
            margin: 20px 0;
        }
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
        }
        .btn {
            font-size: 18px;
            display: block;
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #000;
            text-decoration: none;
            color: black;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            cursor: pointer;
        }
        .insta { background-color: #E1306C; color: white; border-color: #E1306C; }
        .whatsapp { background-color: #25D366; color: white; border-color: #25D366; }
        .tiktok { background-color: #000000; color: white; border-color: #000; }
        .youtube { background-color: #FF0000; color: white; border-color: #FF0000; }
        .snapchat { background-color: #FFFC00; color: black; border-color: #FFFC00; }
        .github { background-color: #333; color: white; border-color: #333; }
        
        h3 {
            color: #1d3557; 
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .skills {
            list-style: none; 
            font-size: 18px;
            padding: 0;
        }
        .skills li {
            margin: 8px 0;
        }
        footer {
            margin-top: 40px; 
            color: #666;
            font-size: 14px;
        }
        /* DARK MODE TOGGLE BUTTON */
        .theme-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        body.dark-mode .theme-btn {
            background: #ffd60a;
            color: black;
        }
    </style>
</head>
<body>
    <!-- DARK MODE BUTTON - Body ke shuru mein -->
    <button class="theme-btn" onclick="toggleDark()">🌙 Dark Mode</button>
    
    <div class="container">
        <h1>IB Afridi - Digital Creator</h1>
        <h2>Developer | Designer | Cyber Enthusiast</h2>
        
        <img src="https://i.ibb.co/mVkj8JHk/IMG-20260423-WA0122.jpg" alt="IB Afridi" class="profile-img">
        
        <p class="motivation">One-Sided Lover 🖤</p>
        
        <div class="social-links">
            <a href="https://wa.me/923332149829" target="_blank" class="btn whatsapp">
                💬 WhatsApp Contact
            </a>
            <a href="https://www.instagram.com/ishaqafridi017" target="_blank" class="btn insta">
                📸 Instagram Profile
            </a>
            <a href="https://www.tiktok.com/@ishaqafridi017" target="_blank" class="btn tiktok">
                🎵 TikTok Profile
            </a>
            <a href="https://www.snapchat.com/add/ishaqafridi017" target="_blank" class="btn snapchat">
                👻 Snapchat Profile
            </a>
            <a href="https://www.youtube.com/@ishaqafridi017" target="_blank" class="btn youtube">
                ▶️ YouTube Channel
            </a>
            <a href="https://github.com/ishaq017" target="_blank" class="btn github">
                💻 GitHub Profile
            </a>
        </div>

        <h3>Meri Skills:</h3>
        <div style="margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <span style="background: #e3f2fd; color: #1976d2; padding: 8px 15px; border-radius: 20px; width: 150px; text-align: center; font-weight: bold;">✅ HTML</span>
            <span style="background: #e8f5e9; color: #388e3c; padding: 8px 15px; border-radius: 20px; width: 150px; text-align: center; font-weight: bold;">✅ CSS</span>
            <span style="background: #fff3e0; color: #f57c00; padding: 8px 15px; border-radius: 20px; width: 150px; text-align: center; font-weight: bold;">🔜 JavaScript</span>
            <span style="background: #fce4ec; color: #c2185b; padding: 8px 15px; border-radius: 20px; width: 150px; text-align: center; font-weight: bold;">🔜 GitHub</span>
        </div>

        <footer>
            <p>© 2026 IB Afridi | Tech King 👑</p>
        </footer>
    </div>

    <!-- JAVASCRIPT - Body ke sab se neeche, </body> se pehle -->
    <script>
        function toggleDark() {
            document.body.classList.toggle('dark-mode');
            let btn = document.querySelector('.theme-btn');
            if(document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '☀️ Light Mode';
            } else {
                btn.innerHTML = '🌙 Dark Mode';
            }
        }
    </script>
</body>
</html>
